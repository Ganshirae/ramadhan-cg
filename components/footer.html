<!-- ============================================
     components/footer.html
     Ramadhan – Site Footer
     ============================================ -->
<footer class="relative z-10 border-t border-yellow-500/10 py-10 text-center">
  <!-- Arabic Greeting -->
  <p
    class="arabic-text text-yellow-400/70 text-2xl mb-1"
    lang="ar"
    style="direction: rtl; text-align: center"
  >
    رَمَضَان كَرِيم
  </p>

  <p class="text-amber-50/40 text-xs font-sans">
    Ramadhan &bull; Marhaban ya Ramadhan
  </p>

  <p class="text-amber-50/25 text-xs mt-3 font-sans">
    &copy; 2026 Doa Ramadhan &mdash; Semoga ibadah kita diterima Allah SWT
  </p>
</footer>

<!-- Theme Switcher – tampil di semua halaman -->
<div id="theme-panel" aria-label="Pilih tema tampilan">
  <div class="theme-panel-drawer" id="theme-drawer" aria-hidden="true">
    <p class="theme-panel-title">Tema Tampilan</p>
    <div class="theme-option" data-theme="malam" role="button" tabindex="0">
      <div class="theme-btn" style="background:#052e16; border-color:rgba(74,222,128,0.5);"></div>
      <span class="theme-option-label">Malam Ramadhan</span>
    </div>
    <div class="theme-option" data-theme="sahur" role="button" tabindex="0">
      <div class="theme-btn" style="background:#0c1445; border-color:rgba(147,197,253,0.5);"></div>
      <span class="theme-option-label">Langit Sahur</span>
    </div>
    <div class="theme-option" data-theme="pasir" role="button" tabindex="0">
      <div class="theme-btn" style="background:#1c1008; border-color:rgba(251,191,36,0.5);"></div>
      <span class="theme-option-label">Padang Pasir</span>
    </div>
    <div class="theme-option" data-theme="madinah" role="button" tabindex="0">
      <div class="theme-btn" style="background:#150a1e; border-color:rgba(196,181,253,0.5);"></div>
      <span class="theme-option-label">Madinah</span>
    </div>
    <div class="theme-option" data-theme="fajar" role="button" tabindex="0">
      <div class="theme-btn" style="background:#071e20; border-color:rgba(94,234,212,0.5);"></div>
      <span class="theme-option-label">Fajar</span>
    </div>
  </div>
  <button class="theme-panel-toggle" id="theme-toggle" aria-label="Ganti tema tampilan" aria-expanded="false">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" class="text-yellow-400">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4.098 19.902a3.75 3.75 0 0 0 5.304 0l6.401-6.402M6.75 21A3.75 3.75 0 0 1 3 17.25V4.125C3 3.504 3.504 3 4.125 3h5.25c.621 0 1.125.504 1.125 1.125v4.072M6.75 21a3.75 3.75 0 0 0 3.75-3.75V8.197M6.75 21h13.125c.621 0 1.125-.504 1.125-1.125v-5.25c0-.621-.504-1.125-1.125-1.125h-4.072M10.5 8.197l2.88-2.88c.438-.439 1.15-.439 1.59 0l3.712 3.713c.44.44.44 1.152 0 1.59l-2.879 2.88M6.75 17.25h.008v.008H6.75v-.008Z"/>
    </svg>
  </button>
</div>
