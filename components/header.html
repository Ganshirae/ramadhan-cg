<!-- ============================================
     components/header.html
     Ramadhan Portal – Hero Section
     ============================================ -->
<header
  id="hero-header"
  class="relative z-10 flex flex-col overflow-hidden"
  style="min-height: 100vh;"
  role="banner"
>

  <!-- ── 1. Background image ── -->
  <div id="hero-bg-img"
       class="absolute inset-0 pointer-events-none select-none"
       style="
         background-image: url('assets/img/hero-bg.png');
         background-size: cover;
         background-position: center 25%;
         background-repeat: no-repeat;
         z-index: 0;
       "
       aria-hidden="true">
  </div>

  <!-- ── 2. Theme color overlay (diupdate oleh JS) ── -->
  <div id="hero-overlay"
       class="absolute inset-0 pointer-events-none transition-all duration-700"
       aria-hidden="true"
       style="z-index: 1;">
  </div>

  <!-- ── 3. Bottom fade ke warna background body ── -->
  <div id="hero-fade-bottom"
       class="absolute bottom-0 left-0 right-0 pointer-events-none"
       style="height: 260px; z-index: 2;"
       aria-hidden="true">
  </div>

  <!-- ── 4. Vignette sisi kiri & kanan ── -->
  <div class="absolute inset-0 pointer-events-none" aria-hidden="true"
       style="
         background: radial-gradient(ellipse 120% 100% at center, transparent 35%, rgba(0,0,0,0.45) 100%);
         z-index: 2;
       "></div>

  <!-- ── 5. KONTEN UTAMA ── -->
  <div class="relative flex flex-col items-center justify-center flex-1 text-center px-5"
       style="z-index: 3; padding-top: 120px; padding-bottom: 80px; min-height: 100vh;">

    <!-- Bismillah -->
    <p class="arabic-text text-yellow-300/75 animate-fade-in mb-2"
       style="animation-delay:.05s; direction:rtl; text-align:center; font-size:clamp(1.1rem,2.5vw,1.5rem);"
       lang="ar">
      بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ
    </p>

    <!-- Ornament -->
    <div class="flex items-center justify-center gap-3 my-4 animate-fade-in w-56"
         style="animation-delay:.12s;" aria-hidden="true">
      <div class="h-px flex-1" style="background:linear-gradient(90deg,transparent,rgba(201,169,74,0.55));"></div>
      <svg width="13" height="13" viewBox="0 0 64 64" fill="none" style="flex-shrink:0;">
        <path d="M48 32c0 13.255-10.745 24-24 24C10.745 56 0 45.255 0 32S10.745 8 24 8c-2.21 3.89-3.5 8.393-3.5 13.2C20.5 35.46 31.04 46 44.3 46A24.2 24.2 0 0 0 48 45.7 23.9 23.9 0 0 0 48 32z" fill="#c9a94a" opacity="0.8"/>
      </svg>
      <div class="h-px flex-1" style="background:linear-gradient(90deg,rgba(201,169,74,0.55),transparent);"></div>
    </div>

    <!-- Heading utama -->
    <div class="mb-4 animate-fade-up" style="animation-delay:.2s;">
      <h1 class="font-serif font-bold text-amber-50 leading-none"
          style="font-size:clamp(3.5rem,11vw,7rem); text-shadow:0 2px 40px rgba(0,0,0,0.7), 0 0 80px rgba(0,0,0,0.4);">
        Ramadhan
      </h1>
      <h2 class="font-serif font-bold text-yellow-400 leading-tight"
          style="font-size:clamp(2.2rem,7.5vw,4.8rem); text-shadow:0 2px 24px rgba(201,169,74,0.6), 0 0 60px rgba(0,0,0,0.5);">
        Kareem
      </h2>
    </div>

    <!-- Arabic subtitle -->
    <p class="arabic-text text-yellow-300/50 mb-5 animate-fade-in"
       style="animation-delay:.3s; direction:rtl; text-align:center; font-size:clamp(1.3rem,3.5vw,1.9rem);"
       lang="ar">
      رَمَضَان كَرِيم
    </p>

    <!-- Deskripsi -->
    <p class="text-amber-50/55 leading-relaxed animate-fade-up mb-9"
       style="animation-delay:.38s; font-size:clamp(.82rem,1.8vw,.92rem); max-width:420px; line-height:1.8;">
      Portal ibadah Ramadhan — jadwal imsakiyah, doa harian,
      penghitung zikir, kalkulator zakat, dan checklist ibadah.
    </p>

    <!-- CTA Buttons — max-width proporsional, tidak terlalu lebar -->
    <div class="flex flex-col sm:flex-row gap-3 animate-fade-up mb-7"
         style="animation-delay:.46s; width:100%; max-width:360px;">
      <a href="imsakiyah.html"
         class="group flex items-center justify-center gap-2 py-3.5 rounded-full font-bold text-green-950 text-sm transition-all duration-300 flex-1"
         style="background:linear-gradient(135deg,#b8942e,#c9a94a,#dfc06a);
                box-shadow:0 4px 20px rgba(201,169,74,0.45);
                padding-left:20px; padding-right:20px;">
        Jadwal Imsakiyah
        <svg class="w-4 h-4 flex-shrink-0 group-hover:translate-x-1 transition-transform"
             fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/>
        </svg>
      </a>
      <a href="ibadah.html"
         class="hero-cta-outline flex items-center justify-center gap-2 py-3.5 rounded-full text-sm font-bold transition-all duration-300 flex-1"
         style="padding-left:20px; padding-right:20px;">
        Pantau Ibadah
      </a>
    </div>

    <!-- Quick-nav pills -->
    <div class="flex flex-wrap justify-center gap-2 animate-fade-up" style="animation-delay:.54s;">
      <a href="doa.html"       class="hero-pill">Doa Harian</a>
      <a href="zikir.html"     class="hero-pill">Zikir</a>
      <a href="zakat.html"     class="hero-pill">Zakat</a>
      <a href="imsakiyah.html" class="hero-pill">Imsakiyah</a>
      <a href="ibadah.html"    class="hero-pill">Ibadah</a>
    </div>

    <!-- Scroll cue -->
    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-1.5 animate-bounce-slow"
         aria-hidden="true"
         style="color:rgba(254,243,199,0.18);">
      <span style="font-size:.58rem; font-weight:700; letter-spacing:.18em; text-transform:uppercase;">Jelajahi</span>
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
      </svg>
    </div>

  </div>
</header>
